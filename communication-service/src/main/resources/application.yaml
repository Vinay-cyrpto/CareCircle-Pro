spring:
  application:
    name: communication-service

  datasource:
    url: jdbc:mysql://mysql:3306/carecircle_communication_service?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info
